<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" 
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title th:text="${title}">Safe Application Home</title>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <th:block th:replace="~{general.html :: head}"/>
</head>

<body>
<div class="container">
    <div th:replace="~{general.html :: header}" class="header"></div>

    <div class="card mt-3">
        <div class="search card-body">
            <h2 class="card-title h5">Item Search</h2>
            <p>Looking for something specific? 
               <a th:href="@{/search}" class="btn btn-primary btn-sm">Search Catalog</a>
            </p>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-body">
            <h5 class="card-title">Resources</h5>
            <ul class="list-unstyled">
                <li><a th:href="@{/payloads}">Security Documentation</a></li>
            </ul>
        </div>
    </div>

    <th:block th:replace="~{general.html :: scripts}"/>
</div>
</body>
</html>
